name: his-platform

services:
  # ---- 注册中心 + 配置中心 ----
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: his-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"   # 控制台 + OpenAPI
      - "9848:9848"   # gRPC (客户端必需)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- 主数据库 (一实例多库, DB per service) ----
  postgres:
    image: postgres:16-alpine
    container_name: his-postgres
    environment:
      POSTGRES_USER: his
      POSTGRES_PASSWORD: his123
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U his"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- 缓存 / 分布式锁 ----
  redis:
    image: redis:7-alpine
    container_name: his-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  # ---- 消息总线 (官方镜像, KRaft 模式, 无需 Zookeeper) ----
  kafka:
    image: apache/kafka:3.8.0
    container_name: his-kafka
    ports:
      - "9092:9092"   # 宿主机进程访问
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # 双 listener:HOST(localhost:9092)给宿主机 jar;INTERNAL(kafka:19092)给同网络容器。
      KAFKA_LISTENERS: HOST://:9092,INTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,INTERNAL://kafka:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,HOST:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ---- 可观测 ----
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: his-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    container_name: his-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./scripts/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./scripts/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ==================== 后端 8 微服务 ====================
  # 镜像由根 Dockerfile 多 target 产出(共享一次 Maven 构建)。
  # 容器内连接走 compose DNS:nacos:8848 / postgres:5432 / redis:6379 / kafka:19092。
  # 端口仍发布到宿主同端口,故 Prometheus(host.docker.internal:900x)与宿主直连均可用。
  # 整栈启动:docker compose up -d --build   (注意:先停掉宿主机上同端口的 jar 进程)

  gateway:
    build: { context: ., dockerfile: Dockerfile, target: gateway }
    container_name: his-gateway
    ports: ["9000:9000"]
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
    depends_on:
      nacos: { condition: service_healthy }
    restart: unless-stopped

  auth:
    build: { context: ., dockerfile: Dockerfile, target: auth }
    container_name: his-auth
    ports: ["9001:9001"]
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/his_auth
    depends_on:
      nacos: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  mdm:
    build: { context: ., dockerfile: Dockerfile, target: mdm }
    container_name: his-mdm
    ports: ["9002:9002"]
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/his_mdm
    depends_on:
      nacos: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  registration:
    build: { context: ., dockerfile: Dockerfile, target: registration }
    container_name: his-registration
    ports: ["9003:9003"]
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/his_registration
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      nacos: { condition: service_healthy }
      postgres: { condition: service_healthy }
    restart: unless-stopped

  outpatient:
    build: { context: ., dockerfile: Dockerfile, target: outpatient }
    container_name: his-outpatient
    ports: ["9004:9004"]
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/his_outpatient
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    depends_on:
      nacos: { condition: service_healthy }
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    restart: unless-stopped

  emr:
    build: { context: ., dockerfile: Dockerfile, target: emr }
    container_name: his-emr
    ports: ["9005:9005"]
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/his_emr
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    depends_on:
      nacos: { condition: service_healthy }
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    restart: unless-stopped

  billing:
    build: { context: ., dockerfile: Dockerfile, target: billing }
    container_name: his-billing
    ports: ["9006:9006"]
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/his_billing
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    depends_on:
      nacos: { condition: service_healthy }
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    restart: unless-stopped

  notify:
    build: { context: ., dockerfile: Dockerfile, target: notify }
    container_name: his-notify
    ports: ["9007:9007"]
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/his_notify
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    depends_on:
      nacos: { condition: service_healthy }
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    restart: unless-stopped

  # ---- 前端 SPA (Nginx 托管 + 反代网关) ----
  # 后端在容器内时,host.docker.internal:9000 经宿主发布端口回到 gateway 容器;
  # 后端跑宿主机 jar 时同样可用。两种模式前端都不需改。
  # 启动:docker compose up -d --build web   → http://localhost:8088
  web:
    build: ./his-web
    container_name: his-web
    ports:
      - "8088:80"
    environment:
      GATEWAY_URL: http://host.docker.internal:9000
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
